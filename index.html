<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>高级感电子书模型 - 居中修正终版</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .book-container {
            position: relative;
            width: 463px;
            height: 770px;
            transition: transform 1.2s cubic-bezier(0.28, 0.11, 0.32, 1);
            perspective: 2500px;
            /* 初始位置：封面居中 */
            transform: translateX(0); 
        }

        /* 状态 1：中间双页展开，书脊右移半宽，使左右对称居中 */
        .book-container.open {
            transform: translateX(231.5px);
        }

        /* 状态 2：最后一页翻开后，通过左移抵消翻页位移，使封底居中 */
        .book-container.last-page-open {
            transform: translateX(463px);
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.28, 0.11, 0.32, 1);
            cursor: pointer;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #1a1a1a;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .back {
            transform: rotateY(180deg);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.9);
        }

        .flipped {
            transform: rotateY(-180deg);
        }

        .front::after, .back::after {
            content: '';
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            pointer-events: none;
        }

        .front::after {
            left: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.3), transparent);
        }

        .back::after {
            left: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.6), transparent);
        }
    </style>
</head>
<body>

<div class="book-container" id="bookContainer">
    <div class="page" onclick="flipPage(this)">
        <div class="front"><img src="./截屏2026-04-25 15.50.13.png"></div>
        <div class="back"><img src="./截屏2026-04-25 15.50.00.png"></div>
    </div>

    <div class="page" onclick="flipPage(this)">
        <div class="front"><img src="./截屏2026-04-25 15.56.52.png"></div>
        <div class="back"><img src="./截屏2026-04-25 15.55.20.png"></div>
    </div>
</div>

<script>
    const container = document.getElementById('bookContainer');
    const pages = document.querySelectorAll('.page');

    function flipPage(pageElement) {
        const allPages = Array.from(pages);
        const index = allPages.indexOf(pageElement);
        const isFlippingToBack = !pageElement.classList.contains('flipped');
        
        const isFirstPage = (index === 0);
        const isLastPage = (index === allPages.length - 1);

        if (isFlippingToBack) {
            pageElement.classList.add('flipped');
            pageElement.style.zIndex = 100 + index;

            if (isFirstPage) {
                container.classList.add('open');
            }
            if (isLastPage) {
                // 关键点：最后一页翻开时，容器需要更大幅度的位移来把页面“拉回”中心
                container.classList.remove('open');
                container.classList.add('last-page-open');
            }
        } else {
            pageElement.classList.remove('flipped');
            
            if (isFirstPage) {
                container.classList.remove('open');
            }
            if (isLastPage) {
                container.classList.remove('last-page-open');
                container.classList.add('open');
            }

            setTimeout(() => { 
                pageElement.style.zIndex = pageElement.dataset.originalZ; 
            }, 600);
        }
    }

    pages.forEach((page, index) => {
        const z = pages.length - index;
        page.style.zIndex = z;
        page.dataset.originalZ = z;
    });
</script>

</body>
</html>
